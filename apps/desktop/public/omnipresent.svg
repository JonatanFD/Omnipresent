 <svg id="logo-svg" xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
                    <defs>
                        <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="var(--bg-primary)" />
                            <stop offset="100%" stop-color="var(--bg-secondary)" />
                        </linearGradient>

                        <linearGradient id="halo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#FFB300" />
                            <stop offset="50%" stop-color="#FFD700" />
                            <stop offset="100%" stop-color="#FFB300" />
                        </linearGradient>

                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur stdDeviation="8" result="blur" />
                            <feMerge>
                                <feMergeNode in="blur" />
                                <feMergeNode in="blur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>

                        <filter id="drop-shadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="0" dy="15" stdDeviation="10" flood-color="#000000" flood-opacity="0.3"/>
                        </filter>
                    </defs>

                    <rect id="app-bg" width="512" height="512" rx="115" fill="url(#bg-gradient)" />

                    <ellipse cx="256" cy="115" rx="120" ry="35" fill="none" stroke="url(#halo-gradient)" stroke-width="12" filter="url(#glow)" />
                    <ellipse cx="256" cy="115" rx="120" ry="35" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8"/>

                    <path d="M 179 165
                             L 179 389
                             L 235 333
                             L 277 431
                             L 319 417
                             L 277 319
                             L 333 319
                             Z"
                          fill="#FFFFFF"
                          stroke="#1e293b"
                          stroke-width="12"
                          stroke-linejoin="round"
                          filter="url(#drop-shadow)" />

                </svg>
