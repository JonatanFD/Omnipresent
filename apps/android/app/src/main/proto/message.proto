syntax = "proto3";

package network_protocol;

option java_package = "com.omnipresent.protocol";
option java_multiple_files = true;

message TrackpadMessage {
  string device_name = 1;
  float delta_x = 2;
  float delta_y = 3;

  enum ActionType {
    NO_ACTION = 0;
    RIGHT_CLICK = 1;
    LEFT_CLICK = 2;
    DOUBLE_CLICK = 3;
    HORIZONTAL_SCROLL = 4;
    VERTICAL_SCROLL = 5;
    SWIPE_LEFT = 6;
    SWIPE_RIGHT = 7;
    SWIPE_UP = 8;
    SWIPE_DOWN = 9;
  }

  ActionType action = 4;

  enum PhaseType {
    NONE = 0;
    START = 1;
    UPDATE = 2;
    END = 3;
  }

  PhaseType phase = 5;

  uint64 timestamp = 6;

  uint32 auth_token = 7;
}
