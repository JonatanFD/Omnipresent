syntax = "proto3";

package network_protocol;

message TrackpadMessage {
  string device_name = 1;
  float delta_x = 2;
  float delta_y = 3;

  enum ActionType {
    RIGTH_CLICK = 0;
    LEFT_CLICK = 1;
    DOUBLE_CLICK = 2;
    HORIZONTAL_SCROLL = 3;
    VERTICAL_SCROLL = 4;
    SWIPE_LEFT = 5;
    SWIPE_RIGHT = 6;
    SWIPE_UP = 7;
    SWIPE_DOWN = 8;
  }

  ActionType action = 4;

  enum PhaseType {
    START = 0;
    UPDATE = 1;
    END = 2;
  }

  PhaseType phase = 5;

  uint64 timestamp = 6;
}
